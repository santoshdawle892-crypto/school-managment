<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meri Website</title>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 60px 50px;
      text-align: center;
      max-width: 480px;
      width: 90%;
    }

    .icon { font-size: 56px; margin-bottom: 20px; }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background: #4f46e5;
      color: white;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #4338ca; }

    .badge {
      display: inline-block;
      margin-top: 28px;
      background: #f0fdf4;
      color: #166534;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 50px;
      border: 1px solid #bbf7d0;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">🌟</div>
    <h1>Namaste! Swagat Hai</h1>
    <p>Yeh meri pehli website hai. Yahan aap bahut kuch seekh sakte hain aur naye log se mil sakte hain.</p>
    <button class="btn">Explore Karo</button>
    <div class="badge">✅ Live Website</div>
  </div>

</body>
</html>
